# 結合テスト/ローカル用 Postgres。DATABASE_URL の既定(app/infra/db.py)と一致。
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mss
      POSTGRES_PASSWORD: mss
      POSTGRES_DB: mss
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mss"]
      interval: 2s
      timeout: 3s
      retries: 15
