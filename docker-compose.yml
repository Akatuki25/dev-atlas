# dev-atlas 統合 compose — db + api(:8000, MCP含む) + web(:3000)
# KB は KB_HOST_PATH(未設定ならサンプル)を /kb に read-only マウントする。
# 例: KB_HOST_PATH=$HOME/knowledge_base docker compose up --build
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: atlas
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas"]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - db-data:/var/lib/postgresql/data

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+psycopg://atlas:atlas@db:5432/atlas"
      KB_PATH: /kb
    volumes:
      - ${KB_HOST_PATH:-./examples/kb-sample}:/kb:ro
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "uv run --no-sync python tools/apply-migrations.py &&
             uv run --no-sync uvicorn app.main:app --host 0.0.0.0 --port 8000"

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_BASE: "http://localhost:8000"
    ports:
      - "3000:3000"
    environment:
      KB_PATH: /kb
    volumes:
      - ${KB_HOST_PATH:-./examples/kb-sample}:/kb:ro
    depends_on:
      - api

volumes:
  db-data:
