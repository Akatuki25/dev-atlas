# dev-atlas 統合 compose — db + api(:8000, MCP含む) + web(:3000)
# KB は GitHub API 経由(fs不要)。private repo の read トークンを渡す:
# 例: KB_GITHUB_TOKEN=$(gh auth token) docker compose up --build
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: atlas
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas"]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - db-data:/var/lib/postgresql/data

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+psycopg://atlas:atlas@db:5432/atlas"
      # 認証(既定off。デプロイ時に AUTH_MODE=all + 本物のsecretを注入)
      AUTH_MODE: ${AUTH_MODE:-off}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-change-me}
      ALLOWED_EMAILS: ${ALLOWED_EMAILS:-}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      # MCP は共有トークンで守る(未設定ならローカル用に素通し)
      MCP_TOKEN: ${MCP_TOKEN:-}
      # KB は GitHub API 経由(fs不要)。private repo の read トークン
      KB_GITHUB_TOKEN: ${KB_GITHUB_TOKEN:-}
      KB_REPO: ${KB_REPO:-Akatuki25/knowledge_base}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "uv run --no-sync python tools/apply-migrations.py &&
             uv run --no-sync uvicorn app.main:app --host 0.0.0.0 --port 8000"

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
        NEXT_PUBLIC_AUTH_ENABLED: ${NEXT_PUBLIC_AUTH_ENABLED:-0}
    ports:
      - "3000:3000"
    environment:
      # 認証(既定off。有効化する時は NEXT_PUBLIC_AUTH_ENABLED=1 でビルドし直す)
      NEXT_PUBLIC_AUTH_ENABLED: ${NEXT_PUBLIC_AUTH_ENABLED:-0}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-change-me}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      ALLOWED_EMAILS: ${ALLOWED_EMAILS:-}
      # KB は GitHub API 経由(fs不要)。private repo の read トークン
      KB_GITHUB_TOKEN: ${KB_GITHUB_TOKEN:-}
      KB_REPO: ${KB_REPO:-Akatuki25/knowledge_base}
    depends_on:
      - api

volumes:
  db-data:
